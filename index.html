const GQ=["Были ли в семье разговоры о «нерусских» корнях?","Были ли люди с необычными фамилиями (-еску, -ану, -ски, -берг, -штейн)?","Говорил ли кто-то из старших на другом языке?","Была ли не-православная религия?","Были ли репрессированные, депортированные?","Откуда семья переехала в ваш город?","Сохранились ли старые документы?","Есть ли фотоальбомы до 1950-х? На каком языке подписи?","Помните ли названия деревень, откуда были старшие?","Есть ли «хранитель семейной памяти»?","Была ли смена фамилии?","Были ли «запретные темы» в семье?"];
const CI=2*Math.PI*15;

function mkInit(){return{me:{id:"me",role:"Я",gen:0,gender:null,core:1},father:{id:"father",role:"Отец",gen:1,gender:"m",core:1,parentOf:"me"},mother:{id:"mother",role:"Мать",gen:1,gender:"f",core:1,parentOf:"me"},gm_pat:{id:"gm_pat",role:"Бабушка (по отцу)",gen:2,gender:"f",core:1,parentOf:"father"},gf_pat:{id:"gf_pat",role:"Дедушка (по отцу)",gen:2,gender:"m",core:1,parentOf:"father"},gm_mat:{id:"gm_mat",role:"Бабушка (по матери)",gen:2,gender:"f",core:1,parentOf:"mother"},gf_mat:{id:"gf_mat",role:"Дедушка (по матери)",gen:2,gender:"m",core:1,parentOf:"mother"},ggm1:{id:"ggm1",role:"Прабабушка",gen:3,gender:"f",core:1,parentOf:"gm_pat"},ggf1:{id:"ggf1",role:"Прадедушка",gen:3,gender:"m",core:1,parentOf:"gm_pat"},ggm2:{id:"ggm2",role:"Прабабушка",gen:3,gender:"f",core:1,parentOf:"gf_pat"},ggf2:{id:"ggf2",role:"Прадедушка",gen:3,gender:"m",core:1,parentOf:"gf_pat"},ggm3:{id:"ggm3",role:"Прабабушка",gen:3,gender:"f",core:1,parentOf:"gm_mat"},ggf3:{id:"ggf3",role:"Прадедушка",gen:3,gender:"m",core:1,parentOf:"gm_mat"},ggm4:{id:"ggm4",role:"Прабабушка",gen:3,gender:"f",core:1,parentOf:"gf_mat"},ggf4:{id:"ggf4",role:"Прадедушка",gen:3,gender:"m",core:1,parentOf:"gf_mat"}}}
let S={tree:mkInit(),data:{},general:{},view:"lobby",sel:null,os:{},rid:null,sync:false,am:null};
const LS="ftree-v5";
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function toast(m){const e=document.createElement("div");e.className="toast";e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}
function gid(){return"p"+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function mks(pid){const d=S.data[pid];if(!d)return[];const t=Object.values(d).join(" ").toLowerCase();return[...new Set(MK.filter(m=>t.includes(m)))]}
function pc(pid){const d=S.data[pid];if(!d)return 0;return Math.round(AK.filter(k=>d[k]?.trim?.()).length/AK.length*100)}
function aAlerts(){const r=[];Object.keys(S.tree).forEach(id=>{if(id==="me")return;mks(id).forEach(m=>r.push({person:id,marker:m}))});return r}
function mgr(m){for(const[g,ms]of Object.entries(MG))if(ms.includes(m))return g;return"⚠️ Другое"}

function sL(){try{localStorage.setItem(LS,JSON.stringify({tree:S.tree,data:S.data,general:S.general,rid:S.rid}))}catch{}}
function lL(){try{const d=localStorage.getItem(LS);if(d){const p=JSON.parse(d);if(p.tree)S.tree=p.tree;S.data=p.data||{};S.general=p.general||{};if(p.rid)S.rid=p.rid}}catch{}}
async function sC(){if(!db||!S.rid)return;try{await db.collection("rooms").doc(S.rid).set({tree:S.tree,data:S.data,general:S.general,t:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});S.sync=true}catch(e){console.error(e)}}
function lC(){if(!db||!S.rid)return;if(unsub)unsub();unsub=db.collection("rooms").doc(S.rid).onSnapshot(snap=>{if(snap.exists){const d=snap.data();S.tree=d.tree||mkInit();S.data=d.data||{};S.general=d.general||{};S.sync=true;sL();R()}},()=>{S.sync=false})}
let st=null;function sA(){sL();clearTimeout(st);st=setTimeout(()=>{if(db&&S.rid)sC()},1200)}
function gc(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
async function cRoom(){const code=gc();if(db){try{await db.collection("rooms").doc(code).set({tree:S.tree,data:S.data,general:S.general,t:firebase.firestore.FieldValue.serverTimestamp()});S.sync=true}catch(e){console.error(e)}}S.rid=code;sL();if(db)lC();S.view="tree";R();uURL()}
async function jRoom(code){code=(code||"").toUpperCase().trim();if(code.length<4)return;if(db){try{const snap=await db.collection("rooms").doc(code).get();if(!snap.exists){toast("Комната не найдена");return}const d=snap.data();S.tree=d.tree||mkInit();S.data=d.data||{};S.general=d.general||{};S.sync=true}catch(e){toast("Ошибка подключения");return}}S.rid=code;sL();if(db)lC();S.view="tree";R();uURL()}
function uURL(){if(S.rid)history.replaceState(null,"","?room="+S.rid)}

function addSib(ofId){const o=S.tree[ofId];if(!o)return;const id=gid();const g=o.gender==="f"?"m":"f";S.tree[id]={id,role:g==="f"?"Сестра":"Брат",gen:o.gen,gender:g,core:0,siblingOf:ofId,parentOf:o.parentOf};S.data[id]={};sA();S.am=null;R()}
function addSp(ofId){const o=S.tree[ofId];if(!o)return;const id=gid();const g=o.gender==="f"?"m":"f";S.tree[id]={id,role:g==="f"?"Супруга":"Супруг",gen:o.gen,gender:g,core:0,spouseOf:ofId};S.data[id]={};sA();S.am=null;R()}
function delP(id){if(S.tree[id]?.core)return;Object.keys(S.tree).forEach(k=>{if(S.tree[k].siblingOf===id||S.tree[k].spouseOf===id){delete S.tree[k];delete S.data[k]}});delete S.tree[id];delete S.data[id];if(S.sel===id)S.sel=null;sA();R()}

function R(){
  const al=aAlerts();const am={};al.forEach(a=>am[a.person]=true);
  const ids=Object.keys(S.tree).filter(k=>k!=="me");
  const tot=ids.reduce((s,k)=>s+pc(k),0);
  const pr=ids.length?Math.round(tot/(ids.length*100)*100):0;

  if(S.view==="lobby"){document.getElementById("app").innerHTML=rLob();return}
  const sy=FO?(S.sync?`<span class="sy-s on">☁️ синхр.</span>`:`<span class="sy-s off">⏳</span>`):`<span class="sy-s off">💾 локально</span>`;
  let h=`<div class="hdr"><div class="hdr-logo"><div class="hdr-mark">🌳</div><div><div class="hdr-title">Семейное Древо</div><div class="hdr-sub">${sy}</div></div></div><div class="nav"><button class="nb ${S.view==="tree"&&!S.sel?"on":""}" onclick="go('tree')">Древо</button><button class="nb ${S.view==="general"?"on":""}" onclick="go('general')">Вопросы</button><button class="nb ${S.view==="alerts"?"on":""}" onclick="go('alerts')">Находки${al.length?`<span class="bdg">${al.length}</span>`:""}</button><span class="sp"></span><button class="ib" onclick="doExp()">💾</button><button class="ib" onclick="doImp()">📂</button><button class="ib" onclick="doRst()">🗑️</button></div></div>`;
  h+=`<div class="pb"><div class="pt"><div class="pf" style="width:${pr}%"></div></div><span class="pl">${pr}%</span></div>`;
  if(S.rid)h+=`<div class="sh"><span style="font-size:11px;color:var(--dim)">Код:</span><span class="sh-c">${S.rid}</span><button class="sh-b" onclick="cpL()">📋 Скопировать ссылку</button></div>`;
  if(S.view==="tree"&&!S.sel)h+=rTree(am);
  else if(S.view==="tree"&&S.sel)h+=rPers(S.sel);
  else if(S.view==="general")h+=rGen();
  else if(S.view==="alerts")h+=rAl(al);
  document.getElementById("app").innerHTML=h;
  document.body.onclick=e=>{if(!e.target.closest('.am')&&!e.target.closest('.ab')){if(S.am){S.am=null;document.querySelectorAll('.am').forEach(m=>m.classList.remove('show'))}}};
}

function rLob(){return`<div class="lo"><div class="lc"><div class="li">🌳</div><div class="lt">Семейное Древо</div><div class="ld">Интерактивная анкета для исследования происхождения. Создайте комнату и поделитесь ссылкой с родственниками — заполняйте вместе.</div><button class="lb p" onclick="cRoom()">Создать новое древо</button><div class="lv">или присоединиться</div><input class="lj" id="jI" placeholder="КОД" maxlength="6" oninput="this.value=this.value.toUpperCase()"><button class="lb s" onclick="jRoom(document.getElementById('jI').value)">Войти по коду</button>${!FO?`<div class="lw">⚠️ Firebase не настроен. Данные сохраняются локально в браузере.</div>`:""}</div></div>`}

function rTree(am){
  const gens=[[],[],[],[]];Object.values(S.tree).forEach(p=>{if(p.gen>=0&&p.gen<=3)gens[p.gen].push(p)});
  const gL=["","Родители","Бабушки и дедушки","Прабабушки и прадедушки"];
  let rows="";
  for(let g=0;g<=3;g++){
    if(g===0){rows+=`<div class="gr"><div class="fg">${rNd(S.tree.me,am)}</div></div>`;continue}
    const fams={};gens[g].forEach(p=>{const k=p.parentOf||p.siblingOf||p.spouseOf||"x";if(!fams[k])fams[k]=[];fams[k].push(p)});
    let fg="";
    const keys=Object.keys(fams).sort((a,b)=>Object.keys(S.tree).indexOf(a)-Object.keys(S.tree).indexOf(b));
    keys.forEach(k=>{const f=fams[k];f.sort((a,b)=>(b.core||0)-(a.core||0));
      let ns=f.map(p=>rNd(p,am)).join("");
      const core=f.find(p=>p.core);
      if(core){const mid="m_"+core.id;const show=S.am===mid;
        ns+=`<div style="position:relative;align-self:center"><button class="ab" onclick="event.stopPropagation();tgA('${mid}')">+</button><div class="am ${show?"show":""}" onclick="event.stopPropagation()"><button onclick="addSib('${core.id}')">👫 Добавить брата/сестру</button><button onclick="addSp('${core.id}')">💍 Добавить супруга(у)</button></div></div>`}
      fg+=`<div class="fg">${ns}</div>`});
    rows+=`<div class="gr">${g>0?`<div class="gl">${gL[g]}</div>`:""}${fg}</div>`}
  return`<div class="ta"><div class="tb">${rows}</div><div class="th">Нажмите карточку для заполнения · Кнопка «+» добавляет родственника</div></div>`
}

function rNd(p,am){
  if(p.id==="me")return`<div class="nd nm"><div class="nrl">Заявитель</div><div class="nn">Я</div></div>`;
  const d=S.data[p.id]||{};const pv=pc(p.id);const ha=am[p.id];
  const nm=(d.firstName||d.surname)?`${d.firstName||""} ${d.surname||""}`.trim():"";
  const cls=[p.core?"":"sib",ha?"ao":"",!ha&&pv>0?(p.gender==="f"?"ff":"fm"):""].filter(Boolean).join(" ");
  const em=p.gender==="f"?"👩":"👨";const rc=ha?"var(--alert)":pv>60?"var(--green)":"var(--gold)";
  const off=CI-CI*(pv/100);
  return`<div class="nd ${cls}" onclick="sel('${p.id}')">
    ${!p.core?`<button class="db can" onclick="event.stopPropagation();delP('${p.id}')">✕</button>`:""}
    <div class="nr"><svg viewBox="0 0 36 36"><circle class="rb" cx="18" cy="18" r="15"/><circle class="rf" cx="18" cy="18" r="15" stroke="${rc}" stroke-dasharray="${CI.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><span class="ne">${em}</span></div>
    <div class="nrl">${esc(p.role)}</div>
    ${nm?`<div class="nn">${esc(nm)}</div>`:`<div class="nn" style="color:var(--dim);font-style:italic;font-size:9px">не заполнено</div>`}
    ${ha?`<div class="na">⚡ зацепка</div>`:""}</div>`
}

function rPers(id){
  const p=S.tree[id];if(!p){S.sel=null;R();return""}
  const d=S.data[id]||{};const mk=mks(id);const pv=pc(id);
  const gc=p.gender==="f"?"var(--fem)":"var(--mal)";const pcC=pv>60?"var(--green)":"var(--gold)";
  const em=p.gender==="f"?"👩":"👨";const dn=d.firstName||p.role;
  let ah="";if(mk.length)ah=`<div class="ax"><div class="axt">⚡ Потенциальные зацепки!</div><div class="axm">${mk.map(m=>`<span>${esc(m)}</span>`).join("")}</div><div class="axd">Возможная связь с территориями бывшей Румынии, Польши, Германии, Прибалтики или еврейским/немецким/греческим происхождением.</div></div>`;
  let ss="";FIELDS.forEach((sec,si)=>{const sk=`${id}_${si}`;const io=S.os[sk]!==false;const fl=sec.f.filter(f=>d[f.k]?.trim?.()).length;
    let fh="";if(io){sec.f.forEach(f=>{const v=d[f.k]||"";const lc=f.c?"fl cr":"fl";const bg=f.c?`<span class="fb">ВАЖНО</span>`:"";
      if(f.m)fh+=`<div class="fd"><label class="${lc}">${esc(f.l)}${bg}</label><textarea class="fi" placeholder="${esc(f.p)}" data-p="${id}" data-f="${f.k}" oninput="uf(this)">${esc(v)}</textarea></div>`;
      else fh+=`<div class="fd"><label class="${lc}">${esc(f.l)}${bg}</label><input type="text" class="fi" placeholder="${esc(f.p)}" value="${esc(v)}" data-p="${id}" data-f="${f.k}" oninput="uf(this)"></div>`
    });fh=`<div class="sy">${fh}</div>`}
    ss+=`<div class="sw"><button class="st ${io?"op":"cl"}" onclick="tgS('${sk}')"><span style="font-size:15px">${sec.i}</span><span style="flex:1">${esc(sec.s)}</span><span class="sc ${fl>0?"h":""}">${fl}/${sec.f.length}</span><span class="sa ${io?"op":""}">▼</span></button>${fh}</div>`});
  return`<div class="pn"><div class="pi"><div class="ph"><button class="bk" onclick="go('tree')">← Назад</button><div style="flex:1"><div class="panel-nm" style="font-family:var(--font-d);font-size:18px;font-weight:700;color:${gc}">${em} ${esc(dn)}${d.surname?` <span style="color:var(--dim)">${esc(d.surname)}</span>`:""}</div><div style="font-size:11px;color:var(--dim)">${esc(p.role)}${!p.core?` · <a href="#" onclick="event.preventDefault();delP('${id}');go('tree')" style="color:var(--alert);font-size:10px">удалить</a>`:""}</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:700;font-family:var(--font-d);color:${pcC}">${pv}%</div><div style="font-size:10px;color:var(--dim)">заполнено</div></div></div>${ah}${ss}</div></div>`
}

function rGen(){let c="";GQ.forEach((q,i)=>{const v=S.general[`q${i}`]||"";c+=`<div class="gc"><div class="gq"><span class="gn">${i+1}.</span>${esc(q)}</div><textarea class="fi" rows="3" placeholder="Ваш ответ..." data-gq="${i}" oninput="ugq(this)">${esc(v)}</textarea></div>`});
  return`<div class="pn"><div class="pi"><div class="gt">Общие вопросы о семье</div><div class="gd">Помогают обнаружить корни, о которых семья «забыла». Любой ответ — даже приблизительный — ценен.</div>${c}</div></div>`}

function rAl(al){
  if(!al.length)return`<div class="pn"><div class="pi"><div class="gt">Обнаруженные зацепки</div><div class="gd">Автоматическая проверка данных на совпадения с территориями и маркерами.</div><div class="ae"><div style="font-size:40px;margin-bottom:10px">🔍</div><div style="font-size:14px;color:var(--dim)">Пока зацепок нет. Заполняйте данные — проверка автоматическая.</div></div></div></div>`;
  const gr={};al.forEach(a=>{const g=mgr(a.marker);if(!gr[g])gr[g]={};if(!gr[g][a.person])gr[g][a.person]=[];gr[g][a.person].push(a.marker)});
  let gh="";Object.entries(gr).forEach(([g,ps])=>{let ph="";Object.entries(ps).forEach(([pid,ms])=>{const d=S.data[pid]||{};const t=S.tree[pid];const nm=(d.firstName||d.surname)?`${d.firstName||""} ${d.surname||""}`.trim():t?.role;ph+=`<div class="agp" onclick="sel('${pid}')"><span>${t?.gender==="f"?"👩":"👨"}</span><div style="flex:1"><div style="font-size:12px;font-weight:600">${esc(nm)}</div><div style="font-size:10px;color:var(--dim)">${esc(t?.role)}</div></div><div style="display:flex;gap:3px;flex-wrap:wrap">${ms.map(m=>`<span class="axm" style="margin:0"><span>${esc(m)}</span></span>`).join("")}</div><span style="color:var(--dim)">→</span></div>`});gh+=`<div class="ag"><div class="agt">${esc(g)}</div>${ph}</div>`});
  return`<div class="pn"><div class="pi"><div class="gt">Обнаруженные зацепки</div><div class="gd">Автоматическая проверка введённых данных.</div>${gh}</div></div>`}

window.go=v=>{S.view=v;S.sel=null;S.am=null;R()};
window.sel=id=>{S.view="tree";S.sel=id;S.am=null;R()};
window.tgS=k=>{S.os[k]=S.os[k]===false;R()};
window.tgA=id=>{S.am=S.am===id?null:id;R()};
window.addSib=addSib;window.addSp=addSp;window.delP=id=>{if(!S.tree[id]?.core&&confirm("Удалить?"))delP(id)};
let ft=null;
window.uf=el=>{const id=el.dataset.p,k=el.dataset.f;if(!S.data[id])S.data[id]={};S.data[id][k]=el.value;clearTimeout(ft);ft=setTimeout(()=>{sA();R()},1000)};
window.ugq=el=>{S.general[`q${el.dataset.gq}`]=el.value;clearTimeout(ft);ft=setTimeout(()=>sA(),1000)};
window.cpL=()=>{const l=location.origin+location.pathname+"?room="+S.rid;navigator.clipboard?.writeText(l).then(()=>toast("Ссылка скопирована!")).catch(()=>{const i=document.createElement("input");i.value=l;document.body.appendChild(i);i.select();document.execCommand("copy");i.remove();toast("Ссылка скопирована!")})};
window.doExp=()=>{const b=new Blob([JSON.stringify({tree:S.tree,data:S.data,general:S.general},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="family-tree.json";a.click();toast("Экспортировано")};
window.doImp=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.tree){S.tree=d.tree;S.data=d.data||{};S.general=d.general||{};sA();R();toast("Импортировано")}}catch{toast("Ошибка формата")}};i.click()};
window.doRst=()=>{if(confirm("Удалить ВСЕ данные?")){S.tree=mkInit();S.data={};S.general={};S.sel=null;sA();R()}};

lL();const ur=new URLSearchParams(location.search).get("room");
if(ur)jRoom(ur);else if(S.rid){S.view="tree";if(db)lC();R();uURL()}else{S.view="lobby";R()}
</script>
</body>
</html>
